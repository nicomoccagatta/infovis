<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desigualdad Económica Global</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2330;
    --border: rgba(255,255,255,0.08);
    --accent: #5b8dee;
    --accent2: #e8614a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    white-space: nowrap;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    flex: 1;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: var(--accent); }

  .year-ctrl {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .year-val {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    min-width: 36px;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 180px;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .stat-pills {
    display: flex;
    gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 11px;
  }
  .pill span {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    display: block;
  }
  .pill label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  svg#world {
    width: 100%;
    height: 100%;
  }

  .country {
    stroke: rgba(255,255,255,0.12);
    stroke-width: 0.4;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .country:hover { opacity: 0.75; stroke-width: 1.2; stroke: #fff; }
  .country.no-data { fill: #1e2330; }

  #sidebar {
    width: 260px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  #country-info h2 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .income-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 14px;
  }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .metric-row:last-child { border-bottom: none; }
  .metric-name { font-size: 12px; color: var(--muted); }
  .metric-value { font-family: var(--mono); font-size: 14px; font-weight: 700; }
  .metric-value.hi { color: #e8614a; }
  .metric-value.lo { color: #4ade80; }
  .metric-value.mid { color: #f59e0b; }
  .metric-value.neutral { color: var(--text); }

  #mini-chart {
    margin-top: 8px;
  }

  #mini-chart canvas {
    width: 100% !important;
    height: 120px !important;
  }

  .empty-state {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  #legend {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .legend-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .legend-bar {
    display: flex;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .legend-ticks {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
  }

  #tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    z-index: 100;
    display: none;
    max-width: 200px;
  }
  #tooltip strong { display: block; font-size: 13px; margin-bottom: 4px; }
  #tooltip span { color: var(--muted); font-family: var(--mono); font-size: 11px; }

  .no-data-note {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">GLOBAL INEQUALITY ▸ 1991–2024</div>
  <div class="controls">
    <div class="ctrl-group">
      <label>Indicador</label>
      <select id="metric">
        <option value="g">Índice de Gini</option>
        <option value="i">Inflación (%)</option>
        <option value="u">Desempleo (%)</option>
        <option value="p">Pobreza (%)</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Año</label>
      <div class="year-ctrl">
        <input type="range" id="yr" min="1991" max="2024" value="2020" step="1">
        <span class="year-val" id="yr-label">2020</span>
      </div>
    </div>
    <div class="stat-pills">
      <div class="pill"><label>Países con datos</label><span id="stat-count">—</span></div>
      <div class="pill"><label>Promedio global</label><span id="stat-avg">—</span></div>
      <div class="pill"><label>Máximo</label><span id="stat-max">—</span></div>
      <div class="pill"><label>Mínimo</label><span id="stat-min">—</span></div>
    </div>
  </div>
</header>

<main>
  <div id="map-container">
    <svg id="world"></svg>
  </div>
  <div id="sidebar">
    <div class="sidebar-title">Detalle país</div>
    <div id="country-info">
      <p class="empty-state">Hacé clic en un país para ver sus datos y serie temporal.</p>
    </div>
    <canvas id="mini-chart-canvas" style="display:none;"></canvas>
    <div id="legend">
      <div class="legend-label" id="legend-title">Escala</div>
      <div class="legend-bar" id="legend-bar"></div>
      <div class="legend-ticks" id="legend-ticks"></div>
    </div>
  </div>
</main>

<div id="tooltip"></div>

const METRICS = {
  g: { label: 'Índice de Gini', unit: '', low: 20, high: 65, fmt: v => v.toFixed(1), colorScheme: 'RdYlGn_r' },
  i: { label: 'Inflación', unit: '%', low: 0, high: 50, fmt: v => v.toFixed(1) + '%', colorScheme: 'RdYlGn_r' },
  u: { label: 'Desempleo', unit: '%', low: 0, high: 35, fmt: v => v.toFixed(1) + '%', colorScheme: 'RdYlGn_r' },
  p: { label: 'Pobreza', unit: '%', low: 0, high: 80, fmt: v => v.toFixed(1) + '%', colorScheme: 'RdYlGn_r' }
};

// Color scales: low=good (green), high=bad (red)
const COLORS_BAD_HIGH = ['#1a6634','#2d9e50','#7ac96d','#c8e88a','#f7f0a0','#f6c164','#e8824a','#d44637','#a61728'];
const COLORS_INFLACION = ['#1a6634','#2d9e50','#7ac96d','#c8e88a','#f7f0a0','#f6c164','#e8824a','#d44637','#a61728'];

let currentMetric = 'g';
let currentYear = 2020;
let selectedIso = null;
let miniChart = null;

// Find closest year
function getVal(iso, year, metric) {
  const c = DATA[iso];
  if (!c) return null;
  const years = Object.keys(c.years).map(Number).sort((a,b)=>a-b);
  if (years.length === 0) return null;
  // exact
  if (c.years[year] && c.years[year][metric] != null) return c.years[year][metric];
  // find closest within ±3
  let closest = null, minDist = Infinity;
  for (const y of years) {
    const d = Math.abs(y - year);
    if (d < minDist && d <= 3) { minDist = d; closest = y; }
  }
  if (closest !== null) return c.years[closest][metric];
  return null;
}

function colorScale(val, m) {
  if (val == null) return '#1e2330';
  const cfg = METRICS[m];
  const t = Math.max(0, Math.min(1, (val - cfg.low) / (cfg.high - cfg.low)));
  const colors = COLORS_BAD_HIGH;
  const idx = Math.floor(t * (colors.length - 1));
  const frac = t * (colors.length - 1) - idx;
  if (idx >= colors.length - 1) return colors[colors.length - 1];
  return lerpColor(colors[idx], colors[idx + 1], frac);
}

function lerpColor(c1, c2, t) {
  const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
  const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
  const r = Math.round(r1 + (r2-r1)*t), g = Math.round(g1 + (g2-g1)*t), b = Math.round(b1 + (b2-b1)*t);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ISO numeric to alpha3 mapping (world-atlas uses numeric IDs)
// We'll build lookup from our data by matching names
let numToIso = {};

function updateMap() {
  const m = currentMetric;
  const y = currentYear;
  let vals = [];
  d3.selectAll('.country').each(function() {
    const iso = this.dataset.iso;
    const v = getVal(iso, y, m);
    if (v != null) vals.push(v);
    d3.select(this)
      .attr('fill', v != null ? colorScale(v, m) : '#1e2330')
      .classed('no-data', v == null);
  });
  // stats
  document.getElementById('stat-count').textContent = vals.length;
  if (vals.length) {
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    document.getElementById('stat-avg').textContent = METRICS[m].fmt(avg);
    document.getElementById('stat-max').textContent = METRICS[m].fmt(Math.max(...vals));
    document.getElementById('stat-min').textContent = METRICS[m].fmt(Math.min(...vals));
  }
  updateLegend();
}

function updateLegend() {
  const m = currentMetric;
  const cfg = METRICS[m];
  const bar = document.getElementById('legend-bar');
  const ticks = document.getElementById('legend-ticks');
  document.getElementById('legend-title').textContent = cfg.label;
  // build gradient
  bar.innerHTML = '';
  COLORS_BAD_HIGH.forEach(c => {
    const s = document.createElement('span');
    s.style.flex = '1';
    s.style.background = c;
    bar.appendChild(s);
  });
  // ticks
  const steps = 5;
  ticks.innerHTML = '';
  for (let i = 0; i <= steps; i++) {
    const v = cfg.low + (cfg.high - cfg.low) * i / steps;
    const s = document.createElement('span');
    s.textContent = Math.round(v) + (cfg.unit || '');
    ticks.appendChild(s);
  }
}

function showCountry(iso) {
  selectedIso = iso;
  const c = DATA[iso];
  if (!c) return;
  const info = document.getElementById('country-info');
  const m = currentMetric;
  const cfg = METRICS[m];
  const val = getVal(iso, currentYear, m);
  const levelColors = {
    'High income': '#4ade80',
    'Upper middle income': '#60a5fa',
    'Lower middle income': '#f59e0b',
    'Low income': '#f87171',
    'Not classified': '#6b7280'
  };
  const lc = levelColors[c.level] || '#6b7280';

  let metricsHtml = '';
  const allMetrics = [
    {key:'g', label:'Gini'},
    {key:'i', label:'Inflación'},
    {key:'u', label:'Desempleo'},
    {key:'p', label:'Pobreza'}
  ];
  for (const mt of allMetrics) {
    const v = getVal(iso, currentYear, mt.key);
    const mcfg = METRICS[mt.key];
    let cls = 'neutral';
    if (v != null) {
      const t = (v - mcfg.low) / (mcfg.high - mcfg.low);
      cls = t > 0.66 ? 'hi' : t > 0.33 ? 'mid' : 'lo';
    }
    metricsHtml += `<div class="metric-row">
      <span class="metric-name">${mt.label}</span>
      <span class="metric-value ${cls}">${v != null ? mcfg.fmt(v) : '—'}</span>
    </div>`;
  }

  const hasData = Object.keys(c.years).length > 0;
  info.innerHTML = `
    <h2>${c.name}</h2>
    <span class="income-badge" style="color:${lc};border-color:${lc}33;background:${lc}11;">${c.level}</span>
    ${metricsHtml}
    ${!hasData ? '<p class="no-data-note">Sin datos disponibles.</p>' : ''}
  `;

  // mini chart
  const canvas = document.getElementById('mini-chart-canvas');
  canvas.style.display = 'block';
  const years = Object.keys(c.years).map(Number).sort((a,b)=>a-b);
  const chartData = years.map(y => ({ x: y, y: c.years[y][m] ?? null })).filter(d => d.y != null);

  if (miniChart) { miniChart.destroy(); miniChart = null; }
  if (chartData.length > 1) {
    miniChart = new Chart(canvas, {
      type: 'line',
      data: {
        labels: chartData.map(d => d.x),
        datasets: [{
          data: chartData.map(d => d.y),
          borderColor: '#5b8dee',
          backgroundColor: 'rgba(91,141,238,0.12)',
          borderWidth: 2,
          pointRadius: 2,
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: ctx => cfg.fmt(ctx.parsed.y) }
        }},
        scales: {
          x: { ticks: { color: '#6b7280', font: { size: 9 }, maxTicksLimit: 6 }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#6b7280', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
    canvas.style.height = '120px';
  } else {
    canvas.style.display = 'none';
  }
}

// ISO alpha3 from numeric (world-atlas)
const KNOWN_MAP = {"4":"AFG","8":"ALB","12":"DZA","24":"AGO","32":"ARG","51":"ARM","36":"AUS","40":"AUT","31":"AZE","50":"BGD","52":"BRB","112":"BLR","56":"BEL","84":"BLZ","204":"BEN","64":"BTN","68":"BOL","70":"BIH","72":"BWA","76":"BRA","100":"BGR","854":"BFA","108":"BDI","132":"CPV","120":"CMR","124":"CAN","140":"CAF","148":"TCD","152":"CHL","156":"CHN","170":"COL","174":"COM","180":"COD","178":"COG","188":"CRI","384":"CIV","191":"HRV","196":"CYP","203":"CZE","208":"DNK","262":"DJI","214":"DOM","218":"ECU","818":"EGY","222":"SLV","226":"GNQ","233":"EST","748":"SWZ","231":"ETH","242":"FJI","246":"FIN","250":"FRA","266":"GAB","270":"GMB","268":"GEO","276":"DEU","288":"GHA","300":"GRC","320":"GTM","324":"GIN","624":"GNB","328":"GUY","332":"HTI","340":"HND","348":"HUN","352":"ISL","356":"IND","360":"IDN","364":"IRN","368":"IRQ","372":"IRL","376":"ISR","380":"ITA","388":"JAM","392":"JPN","400":"JOR","398":"KAZ","404":"KEN","410":"KOR","417":"KGZ","418":"LAO","428":"LVA","422":"LBN","426":"LSO","430":"LBR","440":"LTU","442":"LUX","450":"MDG","454":"MWI","458":"MYS","462":"MDV","466":"MLI","470":"MLT","478":"MRT","480":"MUS","484":"MEX","498":"MDA","496":"MNG","499":"MNE","504":"MAR","508":"MOZ","104":"MMR","516":"NAM","524":"NPL","528":"NLD","558":"NIC","562":"NER","566":"NGA","807":"MKD","578":"NOR","586":"PAK","591":"PAN","598":"PNG","600":"PRY","604":"PER","608":"PHL","616":"POL","620":"PRT","634":"QAT","642":"ROU","643":"RUS","646":"RWA","882":"WSM","678":"STP","686":"SEN","688":"SRB","694":"SLE","703":"SVK","705":"SVN","090":"SLB","710":"ZAF","728":"SSD","724":"ESP","144":"LKA","662":"LCA","729":"SDN","740":"SUR","752":"SWE","756":"CHE","760":"SYR","762":"TJK","834":"TZA","764":"THA","626":"TLS","768":"TGO","776":"TON","780":"TTO","788":"TUN","792":"TUR","800":"UGA","804":"UKR","784":"ARE","826":"GBR","840":"USA","858":"URY","860":"UZB","548":"VUT","704":"VNM","275":"PSE","887":"YEM","894":"ZMB","716":"ZWE"};

// Init map
d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  const svg = d3.select('#world');
  const container = document.getElementById('map-container');
  const W = container.clientWidth, H = container.clientHeight;

  const projection = d3.geoNaturalEarth1()
    .scale(W / 6.5)
    .translate([W / 2, H / 2]);

  const path = d3.geoPath(projection);
  const countries = topojson.feature(world, world.objects.countries);

  const tooltip = document.getElementById('tooltip');

  svg.selectAll('path.country')
    .data(countries.features)
    .join('path')
    .attr('class', 'country')
    .attr('d', path)
    .each(function(d) {
      const numId = String(d.id);
      const iso = KNOWN_MAP[numId] || KNOWN_MAP[numId.padStart(3,'0')] || null;
      this.dataset.iso = iso || '';
    })
    .on('mousemove', function(event, d) {
      const iso = this.dataset.iso;
      const c = DATA[iso];
      const v = iso ? getVal(iso, currentYear, currentMetric) : null;
      tooltip.style.display = 'block';
      tooltip.style.left = (event.clientX + 14) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
      const name = c ? c.name : (iso || 'Desconocido');
      const valStr = v != null ? METRICS[currentMetric].fmt(v) : 'Sin datos';
      tooltip.innerHTML = `<strong>${name}</strong><span>${METRICS[currentMetric].label}: ${valStr}</span>`;
    })
    .on('mouseleave', function() {
      tooltip.style.display = 'none';
    })
    .on('click', function(event, d) {
      const iso = this.dataset.iso;
      if (iso && DATA[iso]) showCountry(iso);
    });

  // Zoom
  const zoom = d3.zoom().scaleExtent([0.8, 8]).on('zoom', e => {
    svg.selectAll('path.country').attr('transform', e.transform);
  });
  svg.call(zoom);

  updateMap();
});

// Controls
document.getElementById('metric').addEventListener('change', e => {
  currentMetric = e.target.value;
  updateMap();
  if (selectedIso) showCountry(selectedIso);
});

document.getElementById('yr').addEventListener('input', e => {
  currentYear = +e.target.value;
  document.getElementById('yr-label').textContent = currentYear;
  updateMap();
  if (selectedIso) showCountry(selectedIso);
});
</script>
