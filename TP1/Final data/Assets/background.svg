<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#191414"/>
    </linearGradient>
    
    <linearGradient id="grad-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1DB954"/>
      <stop offset="100%" stop-color="#191414" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="grad-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </linearGradient>
    
    <filter id="glow-left">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-right">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#grad-bg)"/>

  <g id="left-sidebar" filter="url(#glow-left)" opacity="0.7">
    <path d="M0,0 C150,200 -50,500 100,800 C150,1000 0,1080 0,1080 Z" fill="url(#grad-left)">
       <animate attributeName="d" 
               values="M0,0 C150,200 -50,500 100,800 C150,1000 0,1080 0,1080;
                       M0,0 C180,250 -30,550 120,850 C170,1050 0,1080 0,1080;
                       M0,0 C150,200 -50,500 100,800 C150,1000 0,1080 0,1080"
               dur="12s" repeatCount="indefinite" />
    </path>

    <g id="spotify-icon" transform="translate(100, 540)" opacity="0.95">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 8,-35; 0,0" dur="7s" repeatCount="indefinite" />
        <path d="M64 0C28.653 0 0 28.653 0 64s28.653 64 64 64 64-28.653 64-64S99.347 0 64 0zm29.356 92.316c-1.144 1.812-3.536 2.4-5.348 1.256-13.628-8.324-30.784-10.216-51-5.584-2.052.472-4.096-.816-4.568-2.868-.472-2.052.816-4.096 2.868-4.568 22.064-5.056 41.056-2.872 56.172 6.36 1.812 1.144 2.4 3.536 1.256 5.348zm7.844-17.412c-1.44 2.34-4.5 3.076-6.84 1.636-15.604-9.592-39.388-12.38-57.844-6.776-2.612.792-5.412-.664-6.204-3.276-.792-2.612.664-5.412 3.276-6.204 21.064-6.392 47.308-3.26 65.976 8.216 2.34 1.436 3.076 4.5 1.636 6.84zm.672-18.048C81.08 44.42 41.5 43.108 18.272 50.156c-3.132.948-6.468-.816-7.416-3.948-.948-3.132.816-6.468 3.948-7.416C40.684 31.06 84.34 32.556 106.66 45.836c2.812 1.672 3.732 5.32 2.06 8.132-1.672 2.812-5.32 3.732-8.132 2.06l.312-.116z" fill="#1DB954"/>
      </g>
    </g>

    <g id="sound-particles" fill="#1DB954" opacity="0.6">
      <circle cx="200" cy="400" r="2.5">
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="400;385;400" dur="6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="680" r="2">
        <animate attributeName="opacity" values="0.6;1;0.6" begin="1s" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="680;695;680" dur="7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="150" cy="300" r="3">
        <animate attributeName="opacity" values="0.6;1;0.6" begin="2s" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="150;162;150" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g id="right-sidebar" filter="url(#glow-right)" opacity="0.6">
    <path d="M1920,0 C1750,250 1850,550 1780,850 C1720,1050 1920,1080 1920,1080 Z" fill="url(#grad-right)">
       <animate attributeName="d" 
               values="M1920,0 C1750,250 1850,550 1780,850 C1720,1050 1920,1080 1920,1080;
                       M1920,0 C1720,300 1820,600 1750,900 C1690,1100 1920,1080 1920,1080;
                       M1920,0 C1750,250 1850,550 1780,850 C1720,1050 1920,1080 1920,1080"
               dur="15s" repeatCount="indefinite" />
    </path>

    <g id="github-icon" transform="translate(1750, 540)" opacity="0.95">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; -8,35; 0,0" dur="8s" repeatCount="indefinite" />
        <path d="M64 0C28.65 0 0 28.65 0 64c0 28.28 18.33 52.28 43.76 60.74 3.2 0.59 4.37-1.39 4.37-3.09 0-1.52-0.06-5.56-0.09-10.91-17.81 3.87-21.56-8.58-21.56-8.58-2.91-7.4-7.11-9.37-7.11-9.37-5.81-3.97 0.44-3.89 0.44-3.89 6.42 0.45 9.8 6.59 9.8 6.59 5.71 9.78 15 6.95 18.66 5.32 0.58-4.14 2.24-6.95 4.08-8.55-14.21-1.62-29.16-7.11-29.16-31.64 0-6.99 2.49-12.71 6.6-17.18-0.66-1.62-2.86-8.13 0.63-16.94 0 0 5.38-1.72 17.61 6.57 5.11-1.42 10.6-2.13 16.05-2.15 5.45 0.02 10.94 0.73 16.06 2.15 12.21-8.3 17.58-6.57 17.58-6.57 3.5 8.81 1.3 15.32 0.64 16.94 4.12 4.47 6.6 10.19 6.6 17.18 0 24.59-14.97 30-29.23 31.59 2.3 1.98 4.35 5.88 4.35 11.86 0 8.57-0.08 15.48-0.08 17.59 0 1.71 1.15 3.71 4.4 3.08C109.69 116.25 128 92.27 128 64 128 28.65 99.35 0 64 0z" fill="#ffffff"/>
      </g>
    </g>

    <g id="data-nodes" fill="#ffffff" opacity="0.6">
      <circle cx="1720" cy="350" r="2.2">
        <animate attributeName="opacity" values="0.6;1;0.6" begin="1.5s" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="350;335;350" dur="6.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1780" cy="750" r="2.8">
        <animate attributeName="opacity" values="0.6;1;0.6" begin="0.5s" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="750;766;750" dur="7.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1800" cy="180" r="1.8">
        <animate attributeName="opacity" values="0.6;1;0.6" begin="2.5s" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="1800;1788;1800" dur="8.5s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>
